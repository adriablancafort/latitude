<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Latitude Production Network Diagram</title>
  <desc id="desc">Network diagram for Latitude production infrastructure showing public ingress, AWS VPC, ECS services, data stores, secrets, observability, and external SaaS integrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="vpc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="private" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="public" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="nodeOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6d28d9"/>
    </marker>
    <style>
      .title{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:42px;font-weight:800;fill:#0f172a}.subtitle{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:18px;fill:#475569}.label{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:20px;font-weight:800;fill:#0f172a}.small{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:14px;fill:#475569}.tiny{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:12px;fill:#64748b}.nodeTitle{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:17px;font-weight:800;fill:white}.nodeText{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:12px;fill:#e2e8f0}.boxText{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:14px;font-weight:700;fill:#0f172a}.boxSmall{font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;font-size:11px;fill:#475569}.boundary{stroke:#94a3b8;stroke-width:2;stroke-dasharray:8 8;fill-opacity:.78}.flow{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#arrow)}.flowThin{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}.dataFlow{fill:none;stroke:#047857;stroke-width:3;marker-end:url(#arrowGreen)}.thirdFlow{fill:none;stroke:#6d28d9;stroke-width:2.5;stroke-dasharray:8 7;marker-end:url(#arrowPurple)}.note{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;filter:url(#softShadow)}
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <circle cx="1590" cy="135" r="260" fill="#dbeafe" opacity="0.35"/>
  <circle cx="185" cy="995" r="240" fill="#ede9fe" opacity="0.45"/>

  <text x="70" y="72" class="title">Latitude Production Network Diagram</text>
  <text x="72" y="104" class="subtitle">Current production topology: AWS eu-central-1, public ingress, private ECS services, managed data stores, and controlled third-party integrations.</text>
  <text x="72" y="132" class="tiny">Last reviewed: 2026-05-20 • Source: infra/ Pulumi configuration</text>

  <!-- External users / internet -->
  <rect x="72" y="185" width="290" height="155" rx="26" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="112" y="230" class="label">Internet / Users</text>
  <text x="112" y="260" class="small">Browser users, API clients,</text>
  <text x="112" y="283" class="small">telemetry SDKs</text>
  <text x="112" y="314" class="tiny">HTTPS only for production traffic</text>

  <rect x="430" y="178" width="325" height="170" rx="24" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="470" y="222" class="label">Route 53 + ACM</text>
  <text x="470" y="252" class="small">console.latitude.so</text>
  <text x="470" y="274" class="small">api.latitude.so</text>
  <text x="470" y="296" class="small">ingest.latitude.so</text>
  <text x="470" y="326" class="tiny">DNS + TLS certificate validation</text>

  <!-- AWS boundary -->
  <rect x="84" y="405" width="1632" height="665" rx="34" fill="url(#aws)" stroke="#fb923c" stroke-width="3" filter="url(#shadow)"/>
  <text x="124" y="450" class="label">AWS Account — Production</text>
  <text x="124" y="477" class="small">Region: eu-central-1 • Infrastructure managed by Pulumi</text>

  <!-- VPC boundary -->
  <rect x="122" y="510" width="1174" height="505" rx="32" fill="url(#vpc)" stroke="#0284c7" stroke-width="3"/>
  <text x="162" y="552" class="label">VPC 10.1.0.0/16</text>
  <text x="162" y="578" class="small">2 availability zones • public and private subnets • security groups enforce east/west access</text>

  <!-- Public subnet -->
  <rect x="160" y="615" width="290" height="330" rx="24" fill="url(#public)" stroke="#60a5fa" stroke-width="2"/>
  <text x="190" y="653" class="label">Public Subnets</text>
  <rect x="195" y="690" width="220" height="135" rx="18" fill="url(#nodeBlue)" filter="url(#softShadow)"/>
  <text x="225" y="728" class="nodeTitle">Application LB</text>
  <text x="225" y="756" class="nodeText">Ports 80 → 443</text>
  <text x="225" y="777" class="nodeText">TLS 1.2/1.3 listener</text>
  <text x="225" y="798" class="nodeText">Host-based routing</text>
  <text x="190" y="874" class="tiny">Security group allows 80/443 from Internet.</text>
  <text x="190" y="895" class="tiny">Forwards only to ECS on port 8080.</text>

  <!-- Private app subnet -->
  <rect x="500" y="615" width="420" height="330" rx="24" fill="url(#private)" stroke="#22c55e" stroke-width="2"/>
  <text x="530" y="653" class="label">Private App Subnets</text>
  <text x="530" y="678" class="small">ECS Fargate services</text>
  <g filter="url(#softShadow)">
    <rect x="535" y="708" width="155" height="82" rx="16" fill="url(#nodeGreen)"/>
    <text x="565" y="742" class="nodeTitle">web</text>
    <text x="565" y="765" class="nodeText">console + auth</text>
    <rect x="725" y="708" width="155" height="82" rx="16" fill="url(#nodeGreen)"/>
    <text x="755" y="742" class="nodeTitle">api</text>
    <text x="755" y="765" class="nodeText">public API</text>
    <rect x="535" y="815" width="155" height="82" rx="16" fill="url(#nodeGreen)"/>
    <text x="565" y="849" class="nodeTitle">ingest</text>
    <text x="565" y="872" class="nodeText">telemetry</text>
    <rect x="725" y="815" width="155" height="82" rx="16" fill="url(#nodeGreen)"/>
    <text x="755" y="849" class="nodeTitle">workers</text>
    <text x="755" y="872" class="nodeText">queues + async</text>
    <rect x="630" y="924" width="155" height="82" rx="16" fill="url(#nodeGreen)"/>
    <text x="660" y="958" class="nodeTitle">workflows</text>
    <text x="660" y="981" class="nodeText">Temporal worker</text>
  </g>

  <!-- Private data subnet -->
  <rect x="970" y="615" width="285" height="330" rx="24" fill="#f8fafc" stroke="#38bdf8" stroke-width="2"/>
  <text x="1000" y="653" class="label">Private Data Subnets</text>
  <g filter="url(#softShadow)">
    <rect x="1005" y="693" width="215" height="75" rx="16" fill="url(#nodePurple)"/>
    <text x="1030" y="726" class="nodeTitle">Aurora PostgreSQL</text>
    <text x="1030" y="749" class="nodeText">canonical app data</text>
    <rect x="1005" y="790" width="215" height="75" rx="16" fill="url(#nodePurple)"/>
    <text x="1030" y="823" class="nodeTitle">MemoryDB Redis</text>
    <text x="1030" y="846" class="nodeText">cache + BullMQ</text>
    <rect x="1005" y="887" width="215" height="75" rx="16" fill="url(#nodePurple)"/>
    <text x="1030" y="920" class="nodeTitle">Bastion</text>
    <text x="1030" y="943" class="nodeText">Tailscale admin path</text>
  </g>
  <text x="1000" y="990" class="tiny">RDS/Redis accept traffic only from ECS or bastion SGs.</text>

  <!-- AWS managed but outside VPC -->
  <rect x="1340" y="510" width="330" height="505" rx="30" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="1372" y="552" class="label">AWS Managed Services</text>
  <g filter="url(#softShadow)">
    <rect x="1370" y="600" width="255" height="78" rx="16" fill="url(#nodeOrange)"/>
    <text x="1398" y="633" class="nodeTitle">S3 spans bucket</text>
    <text x="1398" y="656" class="nodeText">objects, exports, reports</text>
    <rect x="1370" y="705" width="255" height="78" rx="16" fill="url(#nodeOrange)"/>
    <text x="1398" y="738" class="nodeTitle">Secrets Manager</text>
    <text x="1398" y="761" class="nodeText">DB creds + API secrets</text>
    <rect x="1370" y="810" width="255" height="78" rx="16" fill="url(#nodeOrange)"/>
    <text x="1398" y="843" class="nodeTitle">CloudWatch Logs</text>
    <text x="1398" y="866" class="nodeText">service logs</text>
    <rect x="1370" y="915" width="255" height="78" rx="16" fill="url(#nodeOrange)"/>
    <text x="1398" y="948" class="nodeTitle">Config / CloudTrail</text>
    <text x="1398" y="971" class="nodeText">audit + compliance</text>
  </g>

  <!-- External SaaS -->
  <rect x="1000" y="170" width="670" height="215" rx="28" fill="#ffffff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="1035" y="214" class="label">External SaaS Integrations</text>
  <text x="1035" y="242" class="small">Accessed outbound from private ECS tasks over TLS</text>
  <g>
    <rect x="1035" y="270" width="135" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="1062" y="297" class="boxText">ClickHouse</text>
    <rect x="1185" y="270" width="115" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="1212" y="297" class="boxText">Temporal</text>
    <rect x="1315" y="270" width="110" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="1341" y="297" class="boxText">Datadog</text>
    <rect x="1440" y="270" width="92" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="1468" y="297" class="boxText">Stripe</text>
    <rect x="1547" y="270" width="90" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/><text x="1568" y="297" class="boxText">Mailgun</text>
    <rect x="1035" y="324" width="128" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="1057" y="351" class="boxText">OAuth Apps</text>
    <rect x="1178" y="324" width="120" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="1199" y="351" class="boxText">Turnstile</text>
    <rect x="1313" y="324" width="102" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="1336" y="351" class="boxText">PostHog</text>
    <rect x="1430" y="324" width="80" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="1455" y="351" class="boxText">Loops</text>
    <rect x="1525" y="324" width="112" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/><text x="1548" y="351" class="boxText">Intercom</text>
  </g>

  <!-- Flows -->
  <path class="flow" d="M362 263 C386 263 404 263 430 263"/>
  <path class="flow" d="M592 348 C500 438 380 548 315 690"/>
  <path class="flow" d="M415 758 C450 758 486 758 535 758"/>
  <path class="flow" d="M415 758 C505 710 625 698 725 740"/>
  <path class="flow" d="M415 758 C500 818 520 850 535 856"/>
  <path class="dataFlow" d="M880 748 C930 740 965 732 1005 732"/>
  <path class="dataFlow" d="M880 850 C930 840 965 830 1005 830"/>
  <path class="dataFlow" d="M690 856 C835 790 918 748 1005 732"/>
  <path class="dataFlow" d="M785 965 C900 900 960 860 1005 830"/>
  <path class="flowThin" d="M1220 925 C1280 925 1315 955 1370 955"/>
  <path class="flowThin" d="M1220 732 C1282 696 1315 650 1370 640"/>
  <path class="flowThin" d="M880 740 C1060 610 1215 735 1370 744"/>
  <path class="flowThin" d="M880 856 C1065 870 1215 850 1370 850"/>
  <path class="thirdFlow" d="M785 925 C920 530 1040 440 1188 385"/>
  <path class="thirdFlow" d="M880 748 C1050 505 1240 425 1370 385"/>
  <path class="thirdFlow" d="M690 856 C890 515 1025 415 1035 385"/>
  <path class="thirdFlow" d="M880 856 C1120 520 1420 420 1525 385"/>

  <!-- Legend -->
  <rect x="72" y="1092" width="1655" height="74" rx="22" class="note"/>
  <text x="105" y="1125" class="boxText">Legend</text>
  <line x1="190" y1="1120" x2="255" y2="1120" class="flow"/><text x="272" y="1125" class="small">Public HTTPS / service routing</text>
  <line x1="510" y1="1120" x2="575" y2="1120" class="dataFlow"/><text x="592" y="1125" class="small">Private data path</text>
  <line x1="765" y1="1120" x2="830" y2="1120" class="thirdFlow"/><text x="847" y="1125" class="small">Outbound TLS to SaaS</text>
  <text x="105" y="1152" class="tiny">Controls shown: ALB accepts public 80/443, ECS accepts only ALB traffic on 8080, RDS/Redis accept only ECS and bastion security groups, S3/Secrets Manager use VPC endpoints, secrets are stored in AWS Secrets Manager.</text>
</svg>
