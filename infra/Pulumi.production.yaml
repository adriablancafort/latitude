config:
  latitude-infra:imageTag: latest
  latitude-infra:hostedZoneId: Z04918046RTZRA6UX0HY
  latitude-infra:domainName: latitude.so
  latitude-infra:githubOwner: latitude-dev
  latitude-infra:githubRepo: latitude-llm
  latitude-infra:datadogSite: datadoghq.eu
  # Datadog Slack notification handle for the Slack #alerts channel.
  latitude-infra:datadogSlackAlertHandle: "@slack-alerts"
  latitude-infra:enableDatadogSynthetics: "true"
  # Pinned to avoid automatic bastion replacement when AWS publishes newer AL2023 AMIs.
  latitude-infra:bastionAmiId: ami-00b105a12aa2a60eb
  # Temporal Cloud (workflows ECS task)
  latitude-infra:temporalCloudNamespace: "latitude-llm.naqqz"
  # latitude-infra:temporalCloudAddress: "eu-central-1.aws.api.temporal.io:7233"
  # latitude-infra:temporalTaskQueue: "latitude-workflows"
  # Hex SaaS read-only DB access (SSH tunnel via the bastion → Aurora reader endpoint).
  # Both values come from Hex workspace → Settings → Connections (create SSH connection).
  # Set them out-of-band before `pulumi up`:
  #   pulumi config set --secret hexSshPublicKey "ssh-ed25519 AAAA... hex-workspace"
  #   pulumi config set --plaintext hexEgressCidrs '["1.2.3.4/32","5.6.7.8/32"]'
  # When unset, the bastion stays SSM-only (no SSH ingress, no `hex` user).

  latitude-infra:hexSshPublicKey:
    secure: v1:JTuhf59OTzlERZ1m:
  latitude-infra:hexEgressCidrs: '["3.129.36.245/32","3.18.79.139/32","3.13.16.99/32"]'
