name: Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please search [existing issues](https://github.com/latitude-dev/latitude-llm/issues) first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Latitude does this affect?
      options:
        - Traces / Observability
        - Evaluations
        - Search
        - Web UI
        - SDK / Telemetry
        - Other / not sure
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which version or commit are you running, and is it cloud or self-hosted?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output or attach screenshots. (Logs are automatically formatted as code.)
      render: shell
    validations:
      required: false
