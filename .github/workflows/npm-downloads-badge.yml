name: Update npm downloads badge

# Sums last-month downloads across all published @latitude-data npm packages
# and writes the total into .github/badges/npm-downloads.json, which the
# README's shields "endpoint" badge reads. npm's bulk downloads API does not
# support scoped packages, so we query each package and sum them here.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npm-downloads-badge
  cancel-in-progress: false

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute total monthly npm downloads
        run: |
          set -euo pipefail

          # Add new @latitude-data packages here as they are published.
          PACKAGES=(
            "@latitude-data/sdk"
            "@latitude-data/telemetry"
            "@latitude-data/claude-code-telemetry"
            "@latitude-data/pi-telemetry"
            "@latitude-data/openclaw-telemetry"
            "@latitude-data/openclaw-telemetry-cli"
          )

          total=0
          for pkg in "${PACKAGES[@]}"; do
            dl=$(curl -fsSL "https://api.npmjs.org/downloads/point/last-month/${pkg}" | jq -r '.downloads // 0')
            echo "  ${pkg}: ${dl}"
            total=$((total + dl))
          done
          echo "Total last-month downloads: ${total}"

          # Format as a human-readable message.
          if [ "$total" -ge 1000000 ]; then
            msg=$(awk "BEGIN { printf \"%.1fM/month\", ${total}/1000000 }")
          elif [ "$total" -ge 1000 ]; then
            msg=$(awk "BEGIN { printf \"%.0fk/month\", ${total}/1000 }")
          else
            msg="${total}/month"
          fi

          mkdir -p .github/badges
          jq -n --arg msg "$msg" \
            '{schemaVersion: 1, label: "npm latitude", message: $msg, color: "blue"}' \
            > .github/badges/npm-downloads.json

          echo "Wrote badge:"
          cat .github/badges/npm-downloads.json

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges/npm-downloads.json; then
            echo "Badge unchanged; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/npm-downloads.json
          git commit -m "chore: update npm downloads badge [skip ci]"
          git push
